# worker당 열 수 있는 최대 FD 수. WebSocket은 FD를 2개 소모(client + upstream)하므로
# worker_connections × 2 이상으로 설정해야 연결 한도에 막히지 않음
worker_rlimit_nofile 8192;

# event: nginx의 이벤트 처리(커넥션 처리 방식) 설정 블록.
events {
    # 기본값 512 → 2048로 증설 (load test 300VU 이상에서 연결 실패 제거 목적)
    worker_connections 2048;
}

http {
    # 이름이 백엔드인 서버 묶음 정의
    upstream backend {
        # Swarm DNS가 알려주는 모든 app 컨테이너의 8080 포트로 요청을 분산해서 보내라는 의미
        server app:8080;
    }

    server {
        # nginx는 80 포트를 listen
        listen 80;

        # WebSocket 요청
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # 일반 HTTP 요청
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}