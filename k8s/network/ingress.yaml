# Ingress — 외부 트래픽을 클러스터 안의 Service로 라우팅
# Swarm에서 nginx가 하던 리버스 프록시 역할을 대체
# k3s에 내장된 Traefik Ingress Controller가 이 규칙을 실행함
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fitu-ingress
  namespace: fitu
  annotations:
    # Host 헤더를 백엔드 서비스에 그대로 전달
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
spec:
  # ingressClassName: 어떤 Ingress Controller가 이 규칙을 처리할지 명시
  # k3s 기본 내장 Traefik을 사용
  # 여러 Ingress Controller가 설치된 경우 혼동 방지
  ingressClassName: traefik
  rules:
    # host를 지정하지 않으면 모든 호스트에 대해 적용
    # 로컬에서는 localhost, EC2에서는 공인 IP로 접근 가능
    - http:
        paths:
          # WebSocket 경로 → 채팅 서비스로 라우팅
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8081
          # 채팅 REST API → 채팅 서비스로 라우팅
          - path: /api/v2/chat
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 8081
          # 나머지 → 메인 서비스로 라우팅
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
