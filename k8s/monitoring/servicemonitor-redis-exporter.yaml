# Redis Exporter의 메트릭을 Prometheus가 수집하도록 설정하는 ServiceMonitor
# Prometheus Operator가 이 리소스를 감지하여 Prometheus 설정에 자동 반영
#
# [주의] fitu-app-monitor와 동일한 이유로 selector를 빈 값으로 설정하고
# relabelings에서 Service 이름으로 직접 필터링한다.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fitu-redis-exporter-monitor
  namespace: fitu
spec:
  selector: {}
  namespaceSelector:
    matchNames:
      - fitu
  endpoints:
    - port: metrics
      interval: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_name]
          regex: redis-exporter
          action: keep
