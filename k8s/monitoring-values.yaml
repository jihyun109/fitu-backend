# kube-prometheus-stack Helm Chart values 오버라이드
# kube-prometheus-stack 헬름 차트를 설치할 때 기본값 대신 사용할 커스텀 설정 파일
# helm install 또는 helm upgrade 시 -f monitoring-values.yaml 로 지정하여 사용

# ============================================================
# Prometheus 설정
# Prometheus: 메트릭(시계열 데이터)을 수집·저장·쿼리하는 모니터링 핵심 엔진
# ============================================================
prometheus:
  prometheusSpec:
    # 메트릭 데이터 보관 기간
    retention: 3d

    # 저장소 크기 제한 — TSDB(시계열 DB) 디스크 사용량이 512MB를 넘으면 오래된 데이터부터 삭제
    # retention과 retentionSize 중 먼저 도달하는 조건이 적용됨
    retentionSize: "512MB"

    # Prometheus Pod의 CPU/메모리 리소스 제한
    resources:
      # requests: 스케줄링 시 최소 보장 리소스 (노드 배치 기준)
      requests:
        cpu: "0.05"       # 최소 0.05 vCPU (50m) 보장 요청
        memory: 200Mi     # 최소 200MiB 메모리 보장 요청

      # limits: 절대 초과 불가한 최대 리소스 (초과 시 OOMKill 또는 CPU 스로틀링)
      limits:
        cpu: "0.2"        # 최대 0.2 vCPU (200m) 까지 사용 가능
        memory: 400Mi     # 최대 400MiB 메모리 — 초과 시 OOMKill

    # Remote Write Receiver 활성화
    # 외부 시스템(예: k6 부하테스트 도구)이 Prometheus에 직접 메트릭을 push할 수 있게 함
    # 기본적으로 Prometheus는 pull 방식이지만, 이 옵션으로 push도 수신 가능
    enableRemoteWriteReceiver: true

    # ServiceMonitor 선택 범위 설정
    # true(기본값)이면 이 Helm 릴리스와 같은 네임스페이스의 ServiceMonitor만 감시
    # false로 설정하면 모든 네임스페이스의 ServiceMonitor를 감시함
    # → fitu 네임스페이스에 있는 앱의 ServiceMonitor도 수집하기 위해 false로 설정
    serviceMonitorSelectorNilUsesHelmValues: false

    # PodMonitor도 마찬가지로 모든 네임스페이스에서 수집하도록 설정
    podMonitorSelectorNilUsesHelmValues: false

    # ── 메트릭 수집 대상 설정 ──
    # 기존에는 여기에 additionalScrapeConfigs로 fitu-app, redis-exporter 수집 설정을 직접 작성했으나,
    # ServiceMonitor(CRD)로 변환하여 앱과 같은 위치에서 선언적으로 관리하도록 변경
    # → k8s/monitoring/servicemonitor-app.yaml
    # → k8s/monitoring/servicemonitor-redis-exporter.yaml
    #
    # ServiceMonitor 방식의 장점:
    # - 새 수집 대상 추가 시 이 파일(monitoring-values.yaml)을 수정할 필요 없음
    # - ServiceMonitor YAML만 kubectl apply 하면 Prometheus Operator가 자동 반영
    # - helm upgrade 없이 동적으로 수집 대상 추가/제거 가능

# ============================================================
# Grafana 설정
# Grafana: 수집된 메트릭을 시각화하는 대시보드 도구
# Prometheus를 데이터소스로 연결하여 차트/그래프로 모니터링
# ============================================================
grafana:
  # Grafana 서비스 외부 노출 설정
  service:
    type: NodePort        # NodePort: 클러스터 외부에서 노드IP:포트로 직접 접근 가능한 서비스 타입
    nodePort: 30001       # 외부에서 접근할 포트 번호 (브라우저에서 http://<노드IP>:30001 로 접속)
                          # (기존 Docker Compose: 3001:3000 포트 매핑에 해당)

  # Grafana 웹 UI 관리자 계정 비밀번호
  # 프로덕션에서는 Secret으로 관리해야 하나, 개발 환경이므로 평문 사용
  adminPassword: "admin"

  # Grafana Pod의 CPU/메모리 리소스 제한
  # (기존 Docker Compose: cpus 0.2, memory 150M)
  resources:
    requests:
      cpu: "0.05"         # 최소 0.05 vCPU 보장
      memory: 100Mi       # 최소 100MiB 메모리 보장
    limits:
      cpu: "0.2"          # 최대 0.2 vCPU
      memory: 200Mi       # 최대 200MiB 메모리

  # 대시보드 자동 로드 설정 (Sidecar 방식)
  # Grafana Pod 안에 sidecar 컨테이너가 함께 실행되며,
  # grafana_dashboard: "1" 라벨이 붙은 ConfigMap을 자동 감지하여 대시보드로 로드
  # → 대시보드 추가/수정 시 ConfigMap만 kubectl apply 하면 sidecar가 자동 반영
  sidecar:
    dashboards:
      enabled: true                    # true = sidecar 컨테이너 활성화 (kube-prometheus-stack 기본값)
      label: grafana_dashboard         # 이 라벨이 붙은 ConfigMap을 대시보드로 인식
      folder: /tmp/dashboards          # sidecar가 대시보드 JSON을 저장할 컨테이너 내부 경로
      searchNamespace: ALL             # 모든 네임스페이스의 ConfigMap을 감시 (기본은 같은 네임스페이스만)
      allowUiUpdates: true             # true = Grafana UI에서 대시보드 수정 허용 (단, Pod 재시작 시 ConfigMap 원본으로 복구됨)

# ============================================================
# cAdvisor — 컨테이너 리소스 모니터링
# cAdvisor: 각 컨테이너의 CPU, 메모리, 네트워크, 디스크 I/O 사용량을 수집
# kube-prometheus-stack에서는 kubelet에 내장된 cAdvisor 메트릭을 기본 수집하므로
# 별도의 cAdvisor DaemonSet을 배포할 필요 없음
# ============================================================

# ============================================================
# AlertManager — 알림 매니저
# Prometheus가 설정한 규칙(alert rule)에 따라 임계값 초과 시
# Slack, 이메일 등으로 알림을 보내는 컴포넌트
# 현재 프로젝트에서는 미사용이므로 비활성화하여 리소스 절약
# ============================================================
alertmanager:
  enabled: false           # false = AlertManager Pod를 배포하지 않음

# ============================================================
# 기본 내장 exporter 설정
# Exporter: 특정 시스템의 메트릭을 Prometheus가 이해할 수 있는 포맷으로 변환·노출하는 에이전트
# ============================================================

# node-exporter: 각 K8s 노드(물리/가상 서버)의 하드웨어·OS 수준 메트릭 수집
# CPU 사용률, 메모리 사용량, 디스크 I/O, 네트워크 트래픽 등 호스트 레벨 지표
# DaemonSet으로 모든 노드에 1개씩 배포됨
nodeExporter:
  enabled: true            # true = node-exporter DaemonSet 배포 활성화
  resources:
    requests:
      cpu: "0.02"          # 최소 0.02 vCPU (20m) — 매우 가벼운 에이전트이므로 적은 리소스
      memory: 16Mi         # 최소 16MiB 메모리
    limits:
      cpu: "0.05"          # 최대 0.05 vCPU (50m)
      memory: 32Mi         # 최대 32MiB 메모리

# kube-state-metrics: Kubernetes 오브젝트의 상태 메트릭을 생성
# Pod 개수, Deployment 레플리카 상태, Job 성공/실패 등 K8s 리소스 상태를 메트릭으로 변환
# node-exporter(호스트 레벨)와 달리 K8s API 서버에서 오브젝트 상태를 읽어 메트릭화
kubeStateMetrics:
  enabled: true            # true = kube-state-metrics Deployment 배포 활성화
