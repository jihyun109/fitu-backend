# app Pod들 앞에 두는 고정 DNS 주소
# 다른 Pod에서 "app:8080"으로 접근하면 이 Service가 app Pod들에 분배
# Swarm의 overlay 네트워크에서 서비스 이름으로 통신하던 것과 동일
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: fitu
spec:
  # ClusterIP: 클러스터 내부에서만 접근 가능 (기본값)
  # 외부 접근은 Ingress가 처리하므로 내부 통신용으로 충분
  type: ClusterIP
  # selector: 이 Service가 트래픽을 보낼 Pod를 label로 식별
  # deployment-app.yaml의 template.metadata.labels와 일치해야 함
  selector:
    app: fitu-app
  ports:
    - name: http         # 포트 이름 — ServiceMonitor가 이 이름으로 포트를 참조
      port: 8080         # Service가 받는 포트
      targetPort: 8080   # Pod로 전달하는 포트
      protocol: TCP
